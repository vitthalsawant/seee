server {
    listen 3000;
    server_name _;

    # OpenSpeedTest is static files. Point this at your repo folder.
    root C:/Users/vitth/Downloads/Speed-Test;
    index index.html;

    # Recommended for performance testing.
    access_log off;

    # Upload test can POST large bodies.
    client_max_body_size 50m;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Download test file used by the UI.
    location = /downloading {
        add_header Cache-Control "no-store";
        gzip off;
        try_files /downloading =404;
    }

    # Upload endpoint: accept POST and respond 200 OK.
    location = /upload {
        add_header Cache-Control "no-store";

        # Allow cross-origin usage (optional but handy).
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "*" always;

        if ($request_method = OPTIONS) { return 204; }
        if ($request_method = POST) { return 200; }
        if ($request_method = GET) { return 200; }
        return 200;
    }
}

